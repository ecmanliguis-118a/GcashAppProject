<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register & Join Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            min-height: 600px;
        }
        .left-banner {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.85), rgba(0, 123, 255, 0.85)), url('https://picsum.photos') no-repeat center center;
            background-size: cover;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }
        .left-banner h2 {
            margin: 0 0 15px 0;
            font-size: 28px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .left-banner p {
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 25px 0;
            color: #f0f0f0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .promo-badge {
            background-color: #ffc107;
            color: #333;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .right-form {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-form h3 {
            margin: 0 0 20px 0;
            color: #333;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button.btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button.btn-submit:hover {
            background-color: #218838;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 15px 0;
            color: #aaa;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider:not(:empty)::before {
            margin-right: .25em;
        }
        .divider:not(:empty)::after {
            margin-left: .25em;
        }
        .social-logins {
            display: flex;
            gap: 10px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #555;
        }
        .social-btn:hover {
            background-color: #f8f9fa;
            border-color: #bbb;
        }
        .social-btn img {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                max-width: 450px;
                height: auto;
                margin: 20px;
            }
            .left-banner {
                padding: 30px;
                min-height: 150px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-banner">
        <h2>Unlock Premium Access!</h2>
        <p>Sign up today and avail the new PROMO</p>
        <span class="promo-badge">🔥 Limited Offer: 50% Off First Month</span>
    </div>

    <div class="right-form">
        <h3>Create Account</h3>
        <form action="/register-endpoint" method="POST">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="birthday">Birthday</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn-submit">Get Started</button>
        </form>

        <div class="divider">OR REGISTER WITH</div>

        <div class="social-logins">
            <button class="social-btn">
                <img src="https://unpkg.com" alt="Google"> Google
            </button>
            <button class="social-btn">
                <img src="https://unpkg.com" alt="GitHub"> GitHub
            </button>
        </div>
    </div>
</div>

</body>
</html>
